name: F1 Dashboard Auto-Update

on:
  # Sunday 18:00 UTC  — main race finish window
  # Monday 02:00 UTC  — safety net for late-finishing main races
  # Saturday 18:00 UTC — sprint race finish window
  # Sunday 02:00 UTC  — safety net for late-finishing sprints
  schedule:
    - cron: '0 18 * * 0'
    - cron: '0 2  * * 1'
    - cron: '0 18 * * 6'
    - cron: '0 2  * * 0'
  # Also lets you trigger it manually from the GitHub Actions tab
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run update script
        run: python scripts/update_f1_data.py

      - name: Commit & push data.json if changed
        run: |
          git config user.name  "f1-bot"
          git config user.email "f1-bot@users.noreply.github.com"
          git add data.json
          # Only commit if data.json actually changed
          git diff --cached --quiet || git commit -m "chore: post-race data update $(date -u +'%Y-%m-%d')"
          git push
